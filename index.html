<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="乙6単語帳"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>消防設備士乙6 単語帳</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:#0f172a;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#f0f4f8;overscroll-behavior:none;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden;}
.header{padding:16px 20px 12px;border-bottom:1px solid #1e2d45;flex-shrink:0;}
.header h1{font-size:19px;font-weight:800;}
.header p{font-size:11px;color:#4a6a8a;margin-top:2px;}
.content{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,23,42,0.97);border-top:1px solid #1e2d45;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nav-btn{background:none;border:none;cursor:pointer;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-icon{font-size:22px;color:#4a6a8a;line-height:1;}
.nav-icon.active{color:#e63946;}
.nav-icon.accent{font-size:20px;background:#e63946;width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;}
.nav-label{font-size:10px;color:#4a6a8a;}
.nav-label.active,.nav-label.accent{color:#e63946;font-weight:700;}
/* カード */
.card-item{background:#1e2d45;border-radius:14px;padding:14px 16px;border:1px solid #2d4a6e;margin-bottom:10px;}
.card-item .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.tag-cat{font-size:10px;background:#0f172a;color:#94a3b8;padding:2px 8px;border-radius:10px;}
.tag-status{font-size:10px;}
.card-q{color:#f0f4f8;font-size:14px;font-weight:500;line-height:1.5;margin-bottom:4px;}
.card-a{color:#94a3b8;font-size:13px;line-height:1.4;}
.card-actions{display:flex;flex-direction:column;gap:4px;margin-left:12px;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;padding:10px;border-radius:8px;font-size:20px;line-height:1;}
/* 進捗 */
.progress-box{background:linear-gradient(135deg,#1e2d45,#162035);border-radius:20px;padding:28px 24px;margin-bottom:20px;border:1px solid #2d4a6e;text-align:center;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:#0f172a;border-radius:10px;padding:10px 14px;text-align:left;}
.stat-label{font-size:11px;font-weight:600;margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:800;color:#f0f4f8;}
.stat-unit{font-size:13px;color:#64748b;font-weight:400;}
.cat-progress{background:#1e2d45;border-radius:12px;padding:14px 16px;border:1px solid #2d4a6e;margin-bottom:10px;}
.cat-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.cat-name{color:#f0f4f8;font-size:14px;}
.cat-pct{color:#22c55e;font-size:13px;font-weight:700;}
.progress-bar{background:#0f172a;border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#e63946,#22c55e);transition:width 0.5s;}
.cat-count{color:#4a6a8a;font-size:11px;margin-top:6px;}
.section-title{color:#64748b;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:12px;}
/* フィルター */
.filter-row{overflow-x:auto;padding:10px 16px 0;}
.filter-inner{display:flex;gap:8px;width:max-content;padding-bottom:10px;}
.filter-btn{padding:8px 16px;border-radius:20px;border:none;cursor:pointer;font-size:13px;white-space:nowrap;background:#1e2d45;color:#94a3b8;font-weight:400;}
.filter-btn.active{background:#e63946;color:#fff;font-weight:700;}
.filter-btn.status-active{background:#2d4a6e;color:#f0f4f8;border:none;}
.filter-btn.status-inactive{background:transparent;color:#64748b;border:1px solid #2d4a6e;}
/* オーバーレイ */
.overlay{position:fixed;inset:0;background:#0f172a;z-index:200;display:flex;flex-direction:column;max-width:480px;left:50%;transform:translateX(-50%);}
.overlay-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #1e2d45;flex-shrink:0;}
.overlay-title{color:#f0f4f8;font-weight:700;font-size:17px;margin-left:12px;}
.back-btn{background:none;border:none;color:#94a3b8;font-size:26px;cursor:pointer;padding:4px 8px;line-height:1;}
.overlay-content{flex:1;overflow-y:auto;padding:24px 20px;}
/* フォーム */
.form-label{display:block;color:#94a3b8;font-size:13px;margin-bottom:8px;font-weight:500;}
.form-input{width:100%;background:#1e2d45;border:1px solid #2d4a6e;border-radius:10px;padding:14px;color:#f0f4f8;font-size:16px;outline:none;font-family:inherit;}
.form-group{margin-bottom:18px;}
/* ボタン */
.big-btn{border:none;border-radius:14px;padding:17px 24px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;width:100%;margin-bottom:12px;font-family:inherit;}
.btn-red{background:#e63946;}
.btn-blue{background:#1d4ed8;}
.btn-gray{background:#334155;}
.btn-dark{background:#1e2d45;border:1px solid #2d4a6e;}
/* カードめくり */
.flip-area{flex:1;padding:8px 20px 0;perspective:1400px;}
.flip-card{width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);cursor:pointer;position:relative;}
.flip-card.flipped{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.flip-front{background:linear-gradient(150deg,#1e2d45,#162035);border:1.5px solid #2d4a6e;}
.flip-back{background:linear-gradient(150deg,#1a3a2e,#112a20);border:1.5px solid #2d6a4f;transform:rotateY(180deg);overflow-y:auto;}
.flip-cat{font-size:11px;letter-spacing:3px;color:#e63946;font-weight:800;margin-bottom:24px;text-transform:uppercase;}
.flip-q{color:#f0f4f8;font-size:20px;font-weight:600;text-align:center;line-height:1.65;}
.flip-hint{position:absolute;bottom:20px;color:#3a5a7a;font-size:13px;}
.flip-ans-label{font-size:11px;letter-spacing:3px;color:#22c55e;font-weight:800;margin-bottom:24px;text-transform:uppercase;}
.flip-ans{color:#d1fae5;font-size:18px;font-weight:500;text-align:center;line-height:1.75;}
.judge-area{padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));flex-shrink:0;}
.judge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.judge-btn{border-radius:14px;padding:16px 8px;font-size:24px;font-weight:800;cursor:pointer;line-height:1.3;font-family:inherit;}
.judge-hint{color:#3a5a7a;font-size:12px;text-align:center;margin-bottom:12px;}
.quiz-header{padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.quiz-progress-bar{flex:1;background:#1e2d45;border-radius:4px;height:6px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#e63946,#f59e0b);transition:width 0.3s;}
.quiz-count{color:#64748b;font-size:14px;min-width:52px;text-align:right;}
.done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.done-emoji{font-size:72px;margin-bottom:16px;}
.done-title{color:#22c55e;font-size:26px;margin-bottom:8px;font-weight:700;}
.done-msg{color:#94a3b8;margin-bottom:40px;font-size:16px;}
.cat-select-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.cat-select-btn{padding:16px 20px;border-radius:14px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-family:inherit;}
.info-row{color:#94a3b8;font-size:14px;margin-bottom:20px;}
.info-row span{color:#e63946;font-weight:700;}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 0 4px;}
.list-count{color:#64748b;font-size:12px;}
.reset-btn{background:none;border:1px solid #334155;color:#64748b;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🔥 消防設備士 乙6</h1>
    <p id="subtitle">単語帳</p>
  </div>
  <div id="main-content" class="content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
// ── データ ──
const CATEGORIES = ["法令共通","法令類別","機械の基礎知識","構造・機能","消火薬剤・種類","点検・整備"];
const STATUS = {
  new:{label:"未学習",color:"#64748b"},
  correct:{label:"正解 ◎",color:"#22c55e"},
  unsure:{label:"あいまい △",color:"#f59e0b"},
  wrong:{label:"不正解 ✗",color:"#ef4444"}
};
const ALL_CARDS = [
  {id:1,front:"消防法において「防火対象物」とは何か？",back:"山林または舟車、船きょ若しくはふ頭に繋留された船舶、建築物その他の工作物もしくはこれらに属するもの",category:"法令共通"},
  {id:2,front:"消防設備士の免状の種類を2つ答えよ",back:"甲種消防設備士と乙種消防設備士",category:"法令共通"},
  {id:3,front:"乙種消防設備士ができる業務は？",back:"消防用設備等の整備・点検（工事はできない）",category:"法令共通"},
  {id:4,front:"消防設備士免状の書換え申請が必要な場合は？",back:"氏名・本籍地の都道府県が変わったとき",category:"法令共通"},
  {id:5,front:"消防設備士免状の返納命令を出せるのは誰か？",back:"都道府県知事",category:"法令共通"},
  {id:6,front:"消防設備士の講習受講義務の頻度は？",back:"免状取得後最初の4月1日から2年以内、その後は5年ごと",category:"法令共通"},
  {id:7,front:"消防用設備等の点検結果を報告する義務者は？",back:"防火対象物の関係者（所有者・管理者・占有者）",category:"法令共通"},
  {id:8,front:"特定防火対象物の点検報告の頻度は？",back:"1年に1回",category:"法令共通"},
  {id:9,front:"非特定防火対象物の点検報告の頻度は？",back:"3年に1回",category:"法令共通"},
  {id:10,front:"消防用設備等の設置・維持の義務者は？",back:"防火対象物の関係者（所有者・管理者・占有者）",category:"法令共通"},
  {id:11,front:"防火管理者の選任が必要な特定防火対象物の収容人員は？",back:"30人以上",category:"法令共通"},
  {id:12,front:"消防法で定める「関係者」とは？",back:"防火対象物の所有者・管理者・占有者",category:"法令共通"},
  {id:13,front:"消防用設備等の検査を受けなければならない防火対象物は？",back:"延べ面積1,000㎡以上の特定防火対象物など政令で定めるもの",category:"法令共通"},
  {id:14,front:"消防設備士でなければ行えない消火器の業務は？",back:"整備は乙種6類が必要。ただし消火器の設置（工事）は消防設備士でなくてもできる",category:"法令共通"},
  {id:15,front:"消防法第17条の3の3に定める点検の種類は？",back:"機器点検（6ヶ月に1回）と総合点検（1年に1回）",category:"法令共通"},
  {id:16,front:"「特定防火対象物」の例を3つ挙げよ",back:"①劇場・映画館 ②百貨店・マーケット ③病院・診療所",category:"法令共通"},
  {id:17,front:"消防用設備等の「消火設備」に含まれるものを2つ挙げよ",back:"消火器、屋内消火栓設備、スプリンクラー設備 など",category:"法令共通"},
  {id:18,front:"消防設備士免状の交付を行うのは誰か？",back:"都道府県知事",category:"法令共通"},
  {id:19,front:"消防用設備等の工事完了後に届け出る先は？",back:"消防長または消防署長",category:"法令共通"},
  {id:20,front:"防火対象物の用途変更で基準が変わる場合、遡及適用されるか？",back:"原則遡及適用される（既存不適格の特例あり）",category:"法令共通"},
  {id:21,front:"消火器の設置が必要な防火対象物の延べ面積基準は？（一般）",back:"延べ面積150㎡以上",category:"法令類別"},
  {id:22,front:"消火器の歩行距離による設置基準は？",back:"各階ごとに、歩行距離20m以下ごとに1本",category:"法令類別"},
  {id:23,front:"能力単位とは何か？",back:"消火器の消火能力を示す数値。A火災・B火災それぞれに設定される",category:"法令類別"},
  {id:24,front:"消火器の設置高さ基準は？",back:"床面からの高さ1.5m以下の場所に設置",category:"法令類別"},
  {id:25,front:"消火器を設置しなくてよい免除の例を1つ挙げよ",back:"スプリンクラー設備が有効に設置されている部分（延べ面積の1/3相当免除）",category:"法令類別"},
  {id:26,front:"地下街における消火器の歩行距離基準は？",back:"歩行距離20m以下（一般と同じ）",category:"法令類別"},
  {id:27,front:"多量の火気使用場所での消火器の追加設置基準は？",back:"床面積25㎡以下ごとに能力単位1以上",category:"法令類別"},
  {id:28,front:"消火器の設置が義務付けられる指定可燃物の数量は？",back:"指定可燃物の500倍以上を貯蔵・取扱う場所",category:"法令類別"},
  {id:29,front:"A火災用消火器の能力単位算定の基準面積は？（耐火構造以外）",back:"50㎡（耐火構造は100㎡）",category:"法令類別"},
  {id:30,front:"飲食店で火を使用する設備がある場合、消火器設置の面積要件は？",back:"面積に関係なく設置が必要",category:"法令類別"},
  {id:31,front:"消火器は屋外に設置できるか？",back:"できる。ただし雨水等による影響を受けない措置が必要",category:"法令類別"},
  {id:32,front:"消火器の設置場所に表示は必要か？",back:"必要。「消火器」と表示した標識を見やすい位置に設ける",category:"法令類別"},
  {id:33,front:"大型消火器の設置基準（歩行距離）は？",back:"歩行距離30m以下ごとに1本",category:"法令類別"},
  {id:34,front:"消火器の設置が必要な地階・無窓階の基準は？",back:"床面積50㎡以上の地階・無窓階",category:"法令類別"},
  {id:35,front:"耐火構造の場合に能力単位算定の基準面積が2倍になる理由は？",back:"耐火構造は延焼リスクが低いため、必要な消火能力を緩和できるため",category:"法令類別"},
  {id:36,front:"圧力の単位を2つ挙げよ",back:"Pa（パスカル）、MPa（メガパスカル）。1MPa＝1,000,000Pa",category:"機械の基礎知識"},
  {id:37,front:"ゲージ圧力と絶対圧力の関係は？",back:"絶対圧力＝ゲージ圧力＋大気圧（約0.1MPa）",category:"機械の基礎知識"},
  {id:38,front:"金属の「引張強さ」とは何か？",back:"材料が引っ張り力に耐えられる最大応力",category:"機械の基礎知識"},
  {id:39,front:"ステンレス鋼の主な合金成分は？",back:"クロム（Cr）とニッケル（Ni）を含む鋼",category:"機械の基礎知識"},
  {id:40,front:"炭酸ガス（CO₂）の性質を3つ挙げよ",back:"①不燃性 ②空気より重い（比重約1.5）③窒息効果がある",category:"機械の基礎知識"},
  {id:41,front:"窒素ガス（N₂）が蓄圧式消火器に使われる理由は？",back:"不活性・不燃性で薬剤と反応せず、安定した加圧ができるため",category:"機械の基礎知識"},
  {id:42,front:"ボイル・シャルルの法則とは？",back:"気体の圧力×体積÷絶対温度＝一定（PV/T＝一定）",category:"機械の基礎知識"},
  {id:43,front:"「腐食」とはどのような現象か？",back:"金属が化学反応（酸化など）により劣化・侵食される現象",category:"機械の基礎知識"},
  {id:44,front:"アルミニウムの特徴を2つ挙げよ",back:"①軽量（比重2.7）②耐食性が高い（酸化皮膜を形成）",category:"機械の基礎知識"},
  {id:45,front:"「応力」とは何か？",back:"外力によって材料内部に生じる単位面積あたりの力",category:"機械の基礎知識"},
  {id:46,front:"安全弁の役割は？",back:"容器内の圧力が異常上昇した際に自動的に圧力を逃がす装置",category:"機械の基礎知識"},
  {id:47,front:"高圧ガス保安法における高圧ガスの定義（圧力）は？",back:"常用の温度で1MPa（ゲージ圧）以上の圧縮ガスなど",category:"機械の基礎知識"},
  {id:48,front:"「充填比」とは何か？",back:"容器の内容積に対する充填ガス質量の比率。安全確保のための基準値がある",category:"機械の基礎知識"},
  {id:49,front:"金属の疲労破壊とはどのような現象か？",back:"繰り返し応力により、静的強度以下の力で破壊が起こる現象",category:"機械の基礎知識"},
  {id:50,front:"「安全率」とは何か？",back:"破壊強度÷許容応力。設計上の安全余裕を示す指数",category:"機械の基礎知識"},
  {id:51,front:"蓄圧式消火器の特徴は？",back:"常時消火薬剤と加圧ガス（窒素等）が同一容器に充填。指示圧力計が付いている",category:"構造・機能"},
  {id:52,front:"加圧式消火器の特徴は？",back:"使用時に加圧用ガス容器（内筒）が破封されて薬剤を放出する。指示圧力計はない",category:"構造・機能"},
  {id:53,front:"指示圧力計の正常範囲（緑色範囲）は？",back:"0.7〜0.98MPa（製品により異なるが概ねこの範囲）",category:"構造・機能"},
  {id:54,front:"消火器の「安全栓」の役割は？",back:"誤操作によるレバー加圧を防止する安全装置",category:"構造・機能"},
  {id:55,front:"消火器の「ノズル」の役割は？",back:"消火薬剤を目的の形状（棒状・噴霧状）で放射する部品",category:"構造・機能"},
  {id:56,front:"化学泡消火器の消火薬剤は何と何が反応するか？",back:"A剤（炭酸水素ナトリウム水溶液）とB剤（硫酸アルミニウム水溶液）が反応してCO₂泡を発生",category:"構造・機能"},
  {id:57,front:"機械泡消火器と化学泡消火器の違いは？",back:"機械泡：空気を混入させて泡を作る。化学泡：薬剤の化学反応で泡を作る",category:"構造・機能"},

// ── State ──
const STORE = "otsu6_v4";
function loadCards(){
  try{
    const d=localStorage.getItem(STORE);
    if(d){const s=JSON.parse(d);const m={};s.forEach(c=>m[c.id]=c.status);return ALL_CARDS.map(c=>({...c,status:m[c.id]||"new"}));}
  }catch{}
  return ALL_CARDS.map(c=>({...c,status:"new"}));
}
function saveCards(){try{localStorage.setItem(STORE,JSON.stringify(cards));}catch{}}

let cards=loadCards();
let currentTab="home";
let overlay=null; // null | "study-select" | "study-quiz" | "study-done" | "add" | {type:"edit",card}
let studyQueue=[], studyIdx=0, studyFlipped=false, studyCat="すべて";
let listFilterCat="すべて", listFilterStatus="すべて";
let touchStartX=null;

// ── Render ──
function render(){
  document.getElementById("subtitle").textContent="単語帳 — 全"+cards.length+"問";
  renderNav();
  if(overlay) renderOverlay();
  else renderMain();
}

function renderNav(){
  const nav=document.getElementById("bottom-nav");
  const tabs=[
    {id:"home",icon:"📊",label:"ホーム"},
    {id:"list",icon:"📋",label:"カード"},
    {id:"study",icon:"🔥",label:"学習",accent:true},
    {id:"add",icon:"＋",label:"追加"},
  ];
  nav.innerHTML=tabs.map(t=>{
    const active=!t.accent&&!overlay&&currentTab===t.id;
    return `<button class="nav-btn" onclick="handleNav('${t.id}')">
      ${t.accent
        ? `<span class="nav-icon accent">🔥</span>`
        : `<span class="nav-icon ${active?'active':''}">${t.icon}</span>`}
      <span class="nav-label ${active||t.accent?'active':''}">${t.label}</span>
    </button>`;
  }).join("");
}

function handleNav(id){
  if(id==="study"){overlay="study-select";render();return;}
  if(id==="add"){overlay="add";render();return;}
  overlay=null;currentTab=id;render();
}

function renderMain(){
  const el=document.getElementById("main-content");
  if(currentTab==="home") el.innerHTML=renderHome();
  else if(currentTab==="list") el.innerHTML=renderList();
}

// ── ホーム ──
function renderHome(){
  const total=cards.length,correct=cards.filter(c=>c.status==="correct").length;
  const unsure=cards.filter(c=>c.status==="unsure").length,wrong=cards.filter(c=>c.status==="wrong").length;
  const pct=total?Math.round((correct/total)*100):0;
  const r=52,circ=2*Math.PI*r;
  const stats=[
    {label:"◎ 正解",val:correct,color:"#22c55e"},
    {label:"△ あいまい",val:unsure,color:"#f59e0b"},
    {label:"✗ 不正解",val:wrong,color:"#ef4444"},
    {label:"未学習",val:total-correct-unsure-wrong,color:"#64748b"},
  ];
  return `
  <div class="progress-box">
    <div style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:130px;height:130px;margin-bottom:16px;">
      <svg width="130" height="130" style="position:absolute;transform:rotate(-90deg)">
        <circle cx="65" cy="65" r="${r}" fill="none" stroke="#0f172a" stroke-width="10"/>
        <circle cx="65" cy="65" r="${r}" fill="none" stroke="#22c55e" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round"
          style="transition:stroke-dashoffset 0.8s ease"/>
      </svg>
      <div style="text-align:center">
        <div style="font-size:30px;font-weight:800;color:#f0f4f8;line-height:1">${pct}%</div>
        <div style="font-size:11px;color:#64748b">習得率</div>
      </div>
    </div>
    <div class="stat-grid">
      ${stats.map(s=>`<div class="stat-card"><div class="stat-label" style="color:${s.color}">${s.label}</div><div class="stat-val">${s.val}<span class="stat-unit">枚</span></div></div>`).join("")}
    </div>
    <button class="big-btn btn-red" style="display:flex;align-items:center;justify-content:center;gap:10px;font-size:18px" onclick="handleNav('study')">🔥 学習スタート</button>
  </div>
  <p class="section-title">カテゴリ別進捗</p>
  ${CATEGORIES.map(cat=>{
    const cc=cards.filter(c=>c.category===cat);if(!cc.length)return"";
    const done=cc.filter(c=>c.status==="correct").length,p=Math.round((done/cc.length)*100);
    return `<div class="cat-progress">
      <div class="cat-header"><span class="cat-name">${cat}</span><span class="cat-pct">${p}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
      <div class="cat-count">${done}/${cc.length}枚</div>
    </div>`;
  }).join("")}`;
}

// ── カード一覧 ──
function renderList(){
  const cats=["すべて",...CATEGORIES];
  const statuses=["すべて",...Object.keys(STATUS)];
  const filtered=cards.filter(c=>(listFilterCat==="すべて"||c.category===listFilterCat)&&(listFilterStatus==="すべて"||c.status===listFilterStatus));
  return `
  <div class="filter-row" style="padding-left:0;padding-right:0;margin:0 -16px;">
    <div class="filter-inner" style="padding-left:16px;padding-right:16px;">
      ${cats.map(c=>`<button class="filter-btn ${listFilterCat===c?'active':''}" onclick="setListCat('${c}')">${c}</button>`).join("")}
    </div>
  </div>
  <div class="filter-row" style="padding-left:0;padding-right:0;margin:0 -16px 8px;">
    <div class="filter-inner" style="padding-left:16px;padding-right:16px;">
      ${statuses.map(s=>`<button class="filter-btn ${listFilterStatus===s?'status-active':'status-inactive'}" onclick="setListStatus('${s}')">${s==="すべて"?"すべて":STATUS[s].label}</button>`).join("")}
    </div>
  </div>
  <div class="list-header">
    <span class="list-count">${filtered.length}枚</span>
    <button class="reset-btn" onclick="resetAll()">全リセット</button>
  </div>
  ${filtered.map(card=>{
    const st=STATUS[card.status]||STATUS.new;
    return `<div class="card-item" style="border-left-color:${st.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="tags">
            <span class="tag-cat">${card.category}</span>
            <span class="tag-status" style="color:${st.color}">${st.label}</span>
          </div>
          <p class="card-q">${card.front}</p>
          <p class="card-a">${card.back}</p>
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="editCard(${card.id})">✏️</button>
          <button class="icon-btn" onclick="deleteCard(${card.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join("")}
  ${!filtered.length?`<div style="text-align:center;color:#4a6a8a;padding:60px 20px">カードがありません。</div>`:""}`;
}

function setListCat(v){listFilterCat=v;render();}
function setListStatus(v){listFilterStatus=v;render();}

// ── オーバーレイ ──
function renderOverlay(){
  const el=document.getElementById("main-content");
  let html="";
  if(overlay==="study-select") html=renderStudySelect();
  else if(overlay==="study-quiz") html=renderStudyQuiz();
  else if(overlay==="study-done") html=renderStudyDone();
  else if(overlay==="add") html=renderCardForm(null);
  else if(overlay&&overlay.type==="edit") html=renderCardForm(overlay.card);
  el.innerHTML=`<div class="overlay">${html}</div>`;
  // スワイプ
  if(overlay==="study-quiz"){
    const area=document.querySelector(".flip-area");
    if(area){
      area.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;},{passive:true});
      area.addEventListener("touchend",e=>{
        if(!studyFlipped||touchStartX===null)return;
        const dx=e.changedTouches[0].clientX-touchStartX;
        if(dx>60)judge("correct");else if(dx<-60)judge("wrong");
        touchStartX=null;
      },{passive:true});
    }
  }
}

// ── 学習：カテゴリ選択 ──
function renderStudySelect(){
  const cats=["すべて",...CATEGORIES];
  const remaining=cards.filter(c=>c.status!=="correct").length;
  return `<div class="overlay-header">
    <button class="back-btn" onclick="closeOverlay()">‹</button>
    <span class="overlay-title">学習モード</span>
  </div>
  <div class="overlay-content">
    <p class="info-row">カテゴリを選んでスタート<br><span>未習得 ${remaining}枚</span> が出題されます</p>
    <div class="cat-select-list">
      ${cats.map(c=>{
        const cnt=cards.filter(card=>(c==="すべて"||card.category===c)&&card.status!=="correct").length;
        return `<button class="cat-select-btn" style="background:${studyCat===c?"#e63946":"#1e2d45"};border:${studyCat===c?"none":"1px solid #2d4a6e"};color:#f0f4f8;font-weight:${studyCat===c?700:400}" onclick="selectStudyCat('${c}')">
          <span>${c}</span><span style="opacity:.75;font-size:13px">${cnt}枚</span>
        </button>`;
      }).join("")}
    </div>
    <button class="big-btn btn-red" style="font-size:18px;padding:18px" onclick="startQuiz()">▶ スタート</button>
  </div>`;
}

function selectStudyCat(c){studyCat=c;render();}

function startQuiz(){
  const pool=cards.filter(c=>(studyCat==="すべて"||c.category===studyCat)&&c.status!=="correct");
  if(!pool.length){overlay="study-done";render();return;}
  studyQueue=pool;studyIdx=0;studyFlipped=false;overlay="study-quiz";render();
}

// ── 学習：クイズ ──
function renderStudyQuiz(){
  const card=studyQueue[studyIdx];
  const pct=(studyIdx/studyQueue.length)*100;
  return `<div class="quiz-header">
    <button class="back-btn" onclick="closeOverlay()">‹</button>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <span class="quiz-count">${studyIdx+1}/${studyQueue.length}</span>
  </div>
  <div class="flip-area" onclick="flipCard()">
    <div class="flip-card ${studyFlipped?'flipped':''}">
      <div class="flip-face flip-front">
        <span class="flip-cat">${card.category}</span>
        <p class="flip-q">${card.front}</p>
        <span class="flip-hint">👆 タップして答えを見る</span>
      </div>
      <div class="flip-face flip-back">
        <span class="flip-ans-label">答え</span>
        <p class="flip-ans">${card.back}</p>
      </div>
    </div>
  </div>
  <div class="judge-area">
    ${studyFlipped?`
    <p class="judge-hint">← スワイプで不正解　　正解でスワイプ →</p>
    <div class="judge-grid">
      <button class="judge-btn" style="background:#ef444422;border:2px solid #ef4444;color:#ef4444" onclick="judge('wrong')">✗<br><span style="font-size:11px">不正解</span></button>
      <button class="judge-btn" style="background:#f59e0b22;border:2px solid #f59e0b;color:#f59e0b" onclick="judge('unsure')">△<br><span style="font-size:11px">あいまい</span></button>
      <button class="judge-btn" style="background:#22c55e22;border:2px solid #22c55e;color:#22c55e" onclick="judge('correct')">◎<br><span style="font-size:11px">正解</span></button>
    </div>`
    :`<button class="big-btn btn-dark" onclick="flipCard()">答えを見る 👆</button>`}
  </div>`;
}

function flipCard(){studyFlipped=!studyFlipped;render();}

function judge(status){
  cards=cards.map(c=>c.id===studyQueue[studyIdx].id?{...c,status}:c);
  saveCards();
  const next=studyIdx+1;
  if(next>=studyQueue.length){overlay="study-done";render();}
  else{studyIdx=next;studyFlipped=false;render();}
}

// ── 学習：完了 ──
function renderStudyDone(){
  return `<div class="overlay-header">
    <button class="back-btn" onclick="closeOverlay()">‹</button>
    <span class="overlay-title">完了</span>
  </div>
  <div class="done-screen">
    <div class="done-emoji">🎉</div>
    <h2 class="done-title">完了！</h2>
    <p class="done-msg">${studyQueue.length}枚を学習しました</p>
    <button class="big-btn btn-blue" onclick="overlay='study-select';render()">もう一度</button>
    <button class="big-btn btn-gray" onclick="closeOverlay()">ホームに戻る</button>
  </div>`;
}

// ── カード追加・編集 ──
function renderCardForm(card){
  const cats=CATEGORIES;
  return `<div class="overlay-header">
    <button class="back-btn" onclick="closeOverlay()">‹</button>
    <span class="overlay-title">${card?"カードを編集":"カードを追加"}</span>
  </div>
  <div class="overlay-content">
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select id="f-cat" class="form-input">
        ${cats.map(c=>`<option ${card&&card.category===c?'selected':''}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">おもて（問題）</label>
      <textarea id="f-front" class="form-input" rows="4" style="resize:vertical" placeholder="例：粉末消火器の主成分は？">${card?card.front:""}</textarea>
    </div>
    <div class="form-group" style="margin-bottom:32px">
      <label class="form-label">うら（答え・解説）</label>
      <textarea id="f-back" class="form-input" rows="4" style="resize:vertical" placeholder="例：リン酸アンモニウム">${card?card.back:""}</textarea>
    </div>
    <button class="big-btn btn-red" onclick="saveForm(${card?card.id:'null'})">保存する</button>
    <button class="big-btn btn-dark" onclick="closeOverlay()">キャンセル</button>
  </div>`;
}

function saveForm(id){
  const front=document.getElementById("f-front").value.trim();
  const back=document.getElementById("f-back").value.trim();
  const category=document.getElementById("f-cat").value;
  if(!front||!back)return;
  if(id){cards=cards.map(c=>c.id===id?{...c,front,back,category}:c);}
  else{cards=[...cards,{id:Date.now(),front,back,category,status:"new"}];}
  saveCards();overlay=null;currentTab="list";render();
}

function editCard(id){const card=cards.find(c=>c.id===id);if(card){overlay={type:"edit",card};render();}}
function deleteCard(id){if(confirm("このカードを削除しますか？")){cards=cards.filter(c=>c.id!==id);saveCards();render();}}
function resetAll(){if(confirm("全カードの学習状況をリセットしますか？")){cards=cards.map(c=>({...c,status:"new"}));saveCards();render();}}
function closeOverlay(){overlay=null;render();}

// ── 起動 ──
render();

// ── Service Worker ──
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("./sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
